<!<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
        body{
            margin: 0;
            padding:0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg,#FFCB61, #FF9B2F);
            font-family: Arial, Helvetica, sans-serif;
        }  
        .login-box{
            color:black;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .login-box input{
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            background: rgba(255,255, 255, 0.8);
            font-size: 16px;
            transition: 0.3s;
        }
        .btn{
            width: 100%;
            padding: 12px;
            background: #FF9B2F;
            color: white;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor:pointer;
            margin-top: 10px;
            transition: 0.3s;
        }
        .btn:hover{
            background: #ED3F27;

        }
        .links{
            margin-top: 20px;
            font-size: 14px;
        }
        .link a{
            color: black;
            text-decoration: none;
            font-weight: 600;
        }
        .link a:hover{
            text-decoration: underline;
            color: #ff6f61;

        }
        footer{
            position: absolute;
            bottom: 10px;
            width: 100%;
            text-align: center;
            font-size: 20px;
            color: black;
            
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Login</h2>
        <form>
            <div class="input-box">
                <input type="text" placeholder="Username" required>
            </div>
            <div class="input-box">
                <input type="password" placeholder="Password" required>
            </div>
            <button class="btn" type="submit">Sign In</button>
            <div class="links">
                <p>Forgot Password? <a href="#">Click here</a></p>
                <p>Don't have an account? <a href="#">Sign up</a></p>
            </div>
        </form>
    </div>

    <footer>@2025 login</footer>
</body>
</html>
